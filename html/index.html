<!DOCTYPE html>
<html>
    
<head>
<title>House icon</title>
<style>
    body {
    background: linear-gradient(#e9f1ff);
}
.row{
    width:720px;
    margin: 10px auto 10px auto ;
}
.image-container {
    display: table-cell;
    vertical-align: middle;
    padding:20px;
    cursor: pointer;
}
.clicked {
    transform: scale(1.1);
    transition: 0.2s;
    filter: brightness(1.2);
}
</style>
</head>


<body>


<div class="row">
    <div class="image-container" onclick="playSound(0, this)">
        <img src="img/house 2.00.png" height="165" width="200"/>
    </div>

    <div class="image-container" onclick="playSound(1, this)">
        <img src="img/door.png" height="160" width="200"/>
    </div>

    <div class="image-container" onclick="playSound(2, this)">
        <img src="img/window.png" height="180" width="200"/>
    </div>
</div>


<div class="row">
    <div class="image-container" onclick="playSound(3, this)">
        <img src="img/sofa.png" height="170" width="210"/>
    </div>

    <div class="image-container" onclick="playSound(4, this)">
        <img src="img/bed 2.00.png" height="200" width="200"/>
    </div>

    <div class="image-container" onclick="playSound(5, this)">
        <img src="img/lamp.png" height="180" width="190"/>
    </div>
</div>


<div class="row">
    <div class="image-container" onclick="playSound(6, this)">
        <img src="img/mug 2.00.png" height="180" width="200"/>
    </div>

    <div class="image-container" onclick="playSound(7, this)">
        <img src="img/key.png" height="180" width="180"/>
    </div>

    <div class="image-container" onclick="playSound(8, this)">
        <img src="img/plant.png" height="200" width="200"/>
       
    </div>
</div>

<script>
const sounds = [     
    new Audio("sound/house.mp3"),
    new Audio("sound/door.mp3"),
    new Audio("sound/window.mp3"),
    new Audio("sound/sofa.wav"),
    new Audio("sound/bed.wav"),
    new Audio("sound/lamp.wav"),
    new Audio("sound/mug.wav"),
    new Audio("sound/keys.wav"),
    new Audio("sound/plant.wav")
];

function playSound(index, el) {  
    let sound = sounds[index];
    sound.currentTime = 0;
    sound.play();


    el.classList.add("clicked");

    setTimeout(() => {
        el.classList.remove("clicked");
    }, 300);
}
</script>
</body>
</html>
